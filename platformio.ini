; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = ./src/
description = AuroraHome - ESP32 / orange pi 3 -based Environmental Monitor
default_envs = esp32dev

[env]
monitor_speed = 115200
monitor_echo = yes
monitor_eol = LF
upload_speed = 921600

[esp32]
platform = espressif32
framework = arduino
build_flags =
	'-DPIOENV="${PIOENV}"'
	-DCORE_DEBUG_LEVEL=0
	-Wno-unused-variable
	-Wno-unused-but-set-variable
	-Wunreachable-code
lib_deps =
	Wire

[env:esp32dev]
extends = esp32
board = esp32dev
build_flags =
	${esp32.build_flags}
lib_deps =
	${esp32.lib_deps}
	sensirion/Sensirion I2C SCD30@^1.0.0
	claws/BH1750@^1.3.0
	adafruit/Adafruit BME280 Library@^2.3.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.2.0

[env:esp32dev-test]
extends = env:esp32dev
test_framework = unity
test_build_src = yes
build_src_filter = +<*> -<main.cpp>
test_filter = test_embedded_*

[env:native]
platform = native
test_framework = unity
test_filter = test_native_*
test_build_src = yes
build_src_filter = +<telemetry.cpp>
lib_deps =
	bblanchon/ArduinoJson@^7.2.0
build_flags =
	-std=gnu++17
	-Wall
	-Wextra
	-I test/stubs

; Env dédié CI (Linux/GCC) — --coverage nécessite gcov runtime (GCC).
; Utiliser : pio test -e native-cov
[env:native-cov]
extends = env:native
build_flags =
	-std=gnu++17
	-Wall
	-Wextra
	-I test/stubs
	--coverage
